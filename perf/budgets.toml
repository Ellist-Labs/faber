# Felix performance budgets
# These are the pass/fail thresholds enforced by perf/macro.sh.
#
# Current tier: "beat VS Code" (Electron baseline)
#   VS Code idle:  ~700 MB RAM, ~3000 ms cold startup, ~12 ms input latency
#   VS Code large: 1-2 GB RAM on big files
#
# Next tier: "match Zed" (native GPU baseline) — tighten when the app matures
#   Zed idle:  200-400 MB RAM, <1000 ms startup, ~2 ms input latency
#
# To tighten: reduce the values below and run `perf/macro.sh` to verify.
# To add a new metric: add it here AND add the check to perf/macro.sh.

[budgets]
startup_ms         = 1000   # cold startup, main.rs entry → cx.activate
idle_rss_mb        = 250    # RSS after window settles on a small file
large_open_ms      = 2000   # startup_ms when opening the large fixture
large_open_rss_mb  = 1000   # RSS after settling on the large fixture
# NOTE: large_open_rss_mb will improve significantly once virtual/windowed rendering
# lands (Phase 2). Current impl pre-allocates all lines as SharedStrings at load time.
# Target after virtual rendering: <300 MB (only visible lines allocated).

# Input-handling metrics — enforced now that input handling exists.
# Measured manually via frame telemetry; macro.sh stubs added below.
# Tighten to "match Zed" tier (<2ms input latency) when the app is feature-stable.
input_latency_ms  = 10    # keystroke → repaint round-trip (target: beat VS Code <12ms)
frame_time_ms     = 8     # 120fps target (8.3 ms/frame)
