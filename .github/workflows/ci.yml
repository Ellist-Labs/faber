name: CI

on:
  pull_request:

env:
  CARGO_TERM_COLOR: always

jobs:
  test:
    # faber-app depends on GPUI which requires macOS frameworks.
    # Test the five gpui-free crates on Linux; run faber-app tests locally on macOS.
    name: fmt / clippy / test
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - name: Cache cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: ${{ runner.os }}-cargo-

      - name: Install build dependencies
        run: sudo apt-get install -y build-essential

      - name: Check formatting
        run: cargo fmt --all -- --check

      - name: Clippy (gpui-free crates)
        run: >
          cargo clippy
          -p faber-core -p faber-lang -p faber-editor -p faber-settings -p faber-theme
          --all-targets -- -D warnings

      - name: Test (gpui-free crates)
        run: >
          cargo test
          -p faber-core -p faber-lang -p faber-editor -p faber-settings -p faber-theme
